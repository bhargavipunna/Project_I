version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  incident-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - ENABLE_REDIS_STREAMS=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  neo4j_data:
